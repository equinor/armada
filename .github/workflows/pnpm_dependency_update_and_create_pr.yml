name: Frontend dependency update (pnpm)

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Path to the frontend project directory containing package.json"
        required: false
        type: string
        default: "frontend"
      node-version:
        description: "Node.js version to use"
        required: false
        type: string
        default: "24"
      pnpm-version:
        description: "pnpm version to install"
        required: false
        type: string
        default: "10.33.4"
      operation:
        description: "Which update to perform: 'update' (pnpm update) or 'audit-fix' (pnpm audit --fix)"
        required: false
        type: string
        default: "update"

# Permissions must be provided from the calling workflow
permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@b307475762933b98ed359c036b0e51f26b63b74b #v5
        with:
          version: ${{ inputs.pnpm-version }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
          cache-dependency-path: ${{ inputs.working-directory }}/pnpm-lock.yaml

      - name: Update pnpm packages
        if: ${{ inputs.operation == 'update' }}
        run: pnpm update

      - name: Apply pnpm audit fix
        if: ${{ inputs.operation == 'audit-fix' }}
        run: pnpm audit --fix

      # `pnpm audit --fix` only writes overrides to package.json /
      # pnpm-workspace.yaml; it does not refresh pnpm-lock.yaml. Running
      # `pnpm install` here both applies the overrides to the lockfile and
      # populates the pnpm store so the `cache: pnpm` post-step in
      # actions/setup-node has a path to cache (otherwise it fails with
      # "Path Validation Error: Path(s) specified in the action for caching
      # do(es) not exist").
      - name: Install dependencies to update lockfile and populate cache
        run: pnpm install --no-frozen-lockfile

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 #v8
        with:
          commit-message: "GHA: Frontend dependency ${{ inputs.operation == 'audit-fix' && 'security fix' || 'update' }}"
          title: "Frontend dependency ${{ inputs.operation == 'audit-fix' && 'security fix' || 'update' }}"
          body: |
            - Automated frontend dependency ${{ inputs.operation == 'audit-fix' && 'security fix' || 'update' }}

            Auto-generated by [create-pull-request][1]

            [1]: https://github.com/peter-evans/create-pull-request
          branch: frontend-dependency-${{ inputs.operation == 'audit-fix' && 'security-fix' || 'update' }}
          labels: automated-pr
          delete-branch: true
