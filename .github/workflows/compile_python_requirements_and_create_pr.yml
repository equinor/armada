name: Compile Requirements

on:
  workflow_call:
    inputs:
      project_names:
        description: "List of project paths (newline or comma separated)"
        required: false
        type: string
        default: "."

# Permissions must be provided from calling workflow
permissions:
  contents: write
  pull-requests: write

jobs:
  compile-requirements:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b #v8.1.0
        with:
          enable-cache: true
          python-version: "3.14.3"

      - name: Upgrade uv.lock
        run: |
          projects_input="${{ inputs.project_names }}"
          # Convert comma-separated input into one project per line.
          projects_by_line="$(tr ',' '\n' <<< "$projects_input")"

          # Read the normalized list line-by-line from the here-string below.
          while IFS= read -r project; do
            # Skip blank lines so uv only runs for real project values.
            if [ -z "$project" ]; then
              continue
            fi

            uv lock --upgrade --exclude-newer "5 days" --no-sources --project "$project"
          # Feed the multi-line project list to the while loop as stdin.
          done <<< "$projects_by_line"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 #v8
        with:
          commit-message: "GHA: Update dependencies"
          title: Update dependencies
          body: |
            - Dependency updates

            Auto-generated by [create-pull-request][1]

            [1]: https://github.com/peter-evans/create-pull-request
          branch: update-dependencies
          labels: automated-pr
          delete-branch: true
