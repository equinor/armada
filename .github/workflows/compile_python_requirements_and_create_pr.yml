name: Compile Requirements

on:
  workflow_call:

# Permissions must be provided from calling workflow
permissions:
  contents: write
  pull-requests: write

jobs:
  compile-requirements:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 #v6
        with:
          python-version: "3.14.3"

      - name: Install pip-tools
        run: |
          python -m pip install pip
          pip install pip-tools
          pip --version
          pip-compile --version
          python -V

      - name: Upgrade dependencies and compile requirements file
        run: |
          pip-compile --output-file=requirements.txt pyproject.toml --upgrade

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e #v7
        with:
          commit-message: "GHA: Update dependencies"
          title: Update dependencies
          body: |
            - Dependency updates

            Auto-generated by [create-pull-request][1]

            [1]: https://github.com/peter-evans/create-pull-request
          branch: update-dependencies
          labels: automated-pr
          delete-branch: true
