name: Frontend dependency update (npm)

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Path to the frontend project directory containing package.json"
        required: false
        type: string
        default: "frontend"
      node-version:
        description: "Node.js version to use"
        required: false
        type: string
        default: "24"
      operation:
        description: "Which update to perform: 'update' (npm update) or 'audit-fix' (npm audit fix)"
        required: false
        type: string
        default: "update"

# Permissions must be provided from the calling workflow
permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Update npm to support minimumReleaseAge
        if: ${{ inputs.operation == 'update' }}
        run: npm install -g npm@11.10.0

      - name: Update npm packages
        if: ${{ inputs.operation == 'update' }}
        run: npm update

      - name: Apply npm audit fix
        if: ${{ inputs.operation == 'audit-fix' }}
        run: npm audit fix

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 #v8
        with:
          commit-message: "GHA: Frontend dependency ${{ inputs.operation == 'audit-fix' && 'security fix' || 'update' }}"
          title: "Frontend dependency ${{ inputs.operation == 'audit-fix' && 'security fix' || 'update' }}"
          body: |
            - Automated frontend dependency ${{ inputs.operation == 'audit-fix' && 'security fix' || 'update' }}

            Auto-generated by [create-pull-request][1]

            [1]: https://github.com/peter-evans/create-pull-request
          branch: frontend-dependency-${{ inputs.operation == 'audit-fix' && 'security-fix' || 'update' }}
          labels: automated-pr
          delete-branch: true
