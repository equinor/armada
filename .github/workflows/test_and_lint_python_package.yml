name: Test and lint python package

on:
  workflow_call:
    inputs:
      python-versions:
        description: "JSON list of python versions"
        required: false
        type: string
        default: '["3.13", "3.14"]'

      test-env:
        description: "JSON object of environment variables provided for pytest run"
        required: false
        type: string
        default: '{}'

      run-black:
        description: "Run black formatter check"
        required: false
        type: boolean
        default: true

      run-mypy:
        description: "Run mypy type checking"
        required: false
        type: boolean
        default: true

      run-ruff:
        description: "Run ruff linting"
        required: false
        type: boolean
        default: true

      run-isort:
        description: "Run isort import sorting"
        required: false
        type: boolean
        default: true

      pre-install-command:
        description: "Command to run before uv sync (e.g. installing PyTorch from CPU index)"
        required: false
        type: string
        default: ''

# Permissions must be provided from calling workflow
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b #v8.1.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Pre-install
        if: ${{ inputs.pre-install-command != '' }}
        run: ${{ inputs.pre-install-command }}

      - name: Install dependencies
        run: uv sync --frozen --no-sources --dev

      - name: Run black
        if: ${{ inputs.run-black }}
        run: black --check .

      - name: Run mypy
        if: ${{ inputs.run-mypy }}
        run: mypy --disable-error-code=import-untyped .

      - name: Run ruff
        if: ${{ inputs.run-ruff }}
        run: ruff check .

      - name: Run isort
        if: ${{ inputs.run-isort }}
        run: isort --check .

      - name: Test with pytest
        run: uv run pytest
        env: ${{ fromJSON(inputs.test-env) }}
