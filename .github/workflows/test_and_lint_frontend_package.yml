name: Test and lint frontend package

on:
  workflow_call:
    inputs:
      node-versions:
        description: "JSON list of node versions"
        required: false
        type: string
        default: '["20.x"]'

      working-directory:
        description: "Path to the frontend project directory"
        required: false
        type: string
        default: "frontend"

      run-prettier:
        description: "Run prettier format check"
        required: false
        type: boolean
        default: true

      run-eslint:
        description: "Run eslint linting"
        required: false
        type: boolean
        default: true

      eslint-target:
        description: "Target path for eslint"
        required: false
        type: string
        default: "."

      run-build:
        description: "Run npm build"
        required: false
        type: boolean
        default: true

      run-tests:
        description: "Run npm test"
        required: false
        type: boolean
        default: false

      test-env:
        description: "JSON object of environment variables provided for test run"
        required: false
        type: string
        default: '{}'

      run-unused-exports:
        description: "Run ts-unused-exports check"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  check_formatting:
    if: ${{ inputs.run-prettier }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ${{ fromJSON(inputs.node-versions) }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Run Prettier
        run: npx prettier --check .

  run_eslint:
    if: ${{ inputs.run-eslint }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ${{ fromJSON(inputs.node-versions) }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"
      - name: Install modules
        run: npm ci
      - name: Run ESLint
        run: npx eslint ${{ inputs.eslint-target }}

  build:
    if: ${{ inputs.run-build }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ${{ fromJSON(inputs.node-versions) }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"
      - name: Install modules
        run: npm ci
      - name: Build
        run: npm run build

  test:
    if: ${{ inputs.run-tests }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ${{ fromJSON(inputs.node-versions) }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"
      - name: Install modules
        run: npm ci
      - name: Run tests
        run: npm test
        env: ${{ fromJSON(inputs.test-env) }}

  check_exports:
    if: ${{ inputs.run-unused-exports }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ${{ fromJSON(inputs.node-versions) }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"
      - name: Install modules
        run: npm ci
      - name: Run Unused Exports Check
        run: ./node_modules/.bin/ts-unused-exports tsconfig.json
