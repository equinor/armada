name: Run dotnet migrations

on:
  workflow_call:
    inputs:
      pr_head_sha:
        description: "PR head commit SHA to checkout (set to skip default ref checkout)"
        required: false
        type: string
        default: ""
      environment:
        description: "Target environment (Development, Staging, Production)"
        required: true
        type: string
      checkout_ref:
        description: "Git ref to checkout (tag, branch, or SHA)"
        required: false
        type: string
        default: "main"
      working_directory:
        description: "Directory containing the .NET project"
        required: true
        type: string
      dotnet_version:
        description: ".NET SDK version"
        required: false
        type: string
        default: "10.0.x"
      dotnet_ef_version:
        description: "dotnet-ef tool version"
        required: false
        type: string
        default: "10.0.*"
      azure_subscription_id:
        description: "Azure subscription ID used for OIDC federated login"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read
  id-token: write

jobs:
  run_migrations:
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6
        with:
          ref: ${{ inputs.pr_head_sha || inputs.checkout_ref }}

      - name: Azure login (OIDC / federated credential)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 #v2.3.0
        with:
          # vars.CLIENTID is an environment-scoped variable resolved via the
          # job's environment: ${{ inputs.environment }} above. It must be
          # defined on the calling repo's GitHub Environment.
          client-id: ${{ vars.CLIENTID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ inputs.azure_subscription_id }}

      - name: Set up .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 #v5
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Build project and dependencies
        run: dotnet build

      - name: Install dotnet ef tool
        run: dotnet tool install -g dotnet-ef --version ${{ inputs.dotnet_ef_version }}

      - name: Update database
        run: dotnet ef database update --no-build --verbose
        env:
          # azure/login above has populated ~/.azure/ on the runner. Callers
          # must include "AzureCliBootstrap" (or another credential type that
          # consults the Azure CLI cache) in their AzureAd:AllowedAuthMethods
          # so that the application's credential chain can authenticate to
          # Azure without a client secret and without a federated token file.
          AZURE_CLIENT_ID: ${{ vars.CLIENTID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ASPNETCORE_ENVIRONMENT: ${{ vars.AspNetEnvironment }}
